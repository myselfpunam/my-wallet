{% extends 'core/base.html' %}
{% block title %}Loan Payment{% endblock %}

{% block content %}
<!-- Page Header -->
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 fade-up">
    <div>
        <h1 class="text-2xl font-bold text-white">Make a Loan Payment</h1>
        <p class="text-slate-400 text-sm mt-1">Record repayment to a lender</p>
    </div>
    <a href="{% url 'loans' %}" class="text-slate-400 hover:text-white transition-colors">
        ← Back to loans
    </a>
</div>

<div class="max-w-2xl">
    <div class="card fade-up">
        <form method="post">
            {% csrf_token %}
            <div class="space-y-6">
                <!-- Loan / Lender -->
                <div>
                    <label class="block text-slate-400 text-sm font-medium mb-2">Select Lender</label>
                    {{ form.loan }}
                </div>

                <!-- Amount -->
                <div>
                    <label class="block text-slate-400 text-sm font-medium mb-2">Payment Amount (৳)</label>
                    {{ form.amount }}
                </div>

                <!-- Date -->
                <div>
                    <label class="block text-slate-400 text-sm font-medium mb-2">Date</label>
                    {{ form.date }}
                </div>

                <!-- Note -->
                <div>
                    <label class="block text-slate-400 text-sm font-medium mb-2">Note (Optional)</label>
                    {{ form.note }}
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="submit" class="btn-primary flex-1">Record Payment</button>
                    <a href="{% url 'loans' %}" class="px-6 py-3 rounded-xl bg-slate-800 border border-slate-700 text-slate-400 font-medium hover:bg-slate-700 transition-colors text-center">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
